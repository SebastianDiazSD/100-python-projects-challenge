<!DOCTYPE html>
<html>
<head>
    <title>Color Palette Generator</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            padding:40px;
            background:#f5f6fa;
        }

        .palette{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:30px;
        }

        .color-box{
            width:120px;
            height:120px;
            margin:10px;
            display:flex;
            align-items:end;
            justify-content:center;
            color:white;
            font-weight:bold;
            border-radius:6px;
        }

        img{
            margin-top:20px;
            max-width:300px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
        }

    </style>
</head>

<body>

<h1>🎨 Color Palette Generator</h1>

<p>Upload an image to extract the top 10 colors.</p>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Generate Palette</button>
</form>

{% if image_path %}
<h2>Uploaded Image</h2>
<img src="{{ image_path }}">
{% endif %}

{% if colors %}
<h2>Top Colors</h2>

<div class="palette">
{% for color in colors %}
<div class="color-box" style="background-color: {{color}}">
{{color}}
</div>
{% endfor %}
</div>

{% endif %}

</body>
</html>
